<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fee Status</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Student Portal</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="student-dashboard.html">Dashboard</a></li>
                <li><a href="student-attendance.html">My Attendance</a></li>
                <li><a href="student-marks.html">My Marks</a></li>
                <li><a href="student-assignments.html">Assignments</a></li>
                <li><a href="student-fees.html" class="active">Fee Status</a></li>
                <li><a href="student-announcements.html">Announcements</a></li>
            </ul>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>My Fee Status</h1>
            </header>
            
            <div class="dashboard-cards">
                <div class="card">
                    <h3>Total Fee</h3>
                    <p class="big-number">₹<span id="summaryTotalFee">--</span></p>
                </div>
                <div class="card">
                    <h3>Paid Amount</h3>
                    <p class="big-number success-text">₹<span id="summaryPaidAmount">--</span></p>
                </div>
                <div class="card">
                    <h3>Balance</h3>
                    <p class="big-number" style="color: #ef4444;">₹<span id="summaryBalance">--</span></p>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Paid</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="feesTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/student.js"></script>
</body>
</html>
