<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Teacher Portal</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="teacher-dashboard.html">Dashboard</a></li>
                <li><a href="students.html" class="active">Manage Students</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="marks.html">Marks</a></li>
                <li><a href="assignments.html">Assignments</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="announcements.html">Announcements</a></li>
            </ul>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Manage Students</h1>
                <button class="btn" style="width: auto;" onclick="openModal('studentModal')">+ Add Student</button>
            </header>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Roll No</th>
                            <th>Class</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for adding student -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Student</h2>
                <span class="close-btn" onclick="closeModal('studentModal')">&times;</span>
            </div>
            <form id="studentForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Roll No</label>
                    <input type="text" id="roll_no" required>
                </div>
                <button type="submit" class="btn">Save Student</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/teacher.js"></script>
</body>
</html>
